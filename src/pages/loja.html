<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volt Motos — Carrinho</title>
  <link rel="stylesheet" href="/src/css/estilo.css" />

  <!-- Basic Icons -->
  <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
  <!-- Filled Icons -->
  <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
  <!-- Brand Icons -->
  <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
</head>
<body>

  <header>
    <nav>
      <a class="logo" href="/index.html">Volt <span>Motos</span></a>
      <ul>
        <li><a href="/index.html"><i class="bx bx-shopping-bag"></i> Produtos</a></li>
        <li><a href="loja.html"><i class="bx bx-cart"></i> Carrinho</a></li>
        <li><a href="sobre.html"><i class="bx-globe-alt-2"></i> Sobre</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1 class="section-titulo">Seu Carrinho</h1>

    <div class="carrinho-wrapper">

      <!-- Lista de itens — populada via JavaScript/DOM -->
      <section aria-label="Itens do carrinho">
        <ul id="lista-carrinho" style="list-style:none; padding:0;">
          <!-- Itens inseridos dinamicamente -->
        </ul>
      </section>

      <!-- Resumo financeiro -->
      <aside class="resumo-financeiro">
        <h2 class="resumo-titulo">Resumo da Compra</h2>

        <div class="resumo-linha">
          <span>Subtotal</span>
          <span id="subtotal">R$ 0,00</span>
        </div>

        <div class="resumo-linha">
          <span>Frete</span>
          <span style="color: var(--cor-sucesso);">Grátis</span>
        </div>

        <!-- Linha de desconto — oculta até aplicar -->
        <div
          class="resumo-linha"
          id="linha-desconto"
          style="display: none;"
        >
          <span>Desconto (10%)</span>
          <span></span>
        </div>

        <div class="resumo-total">
          <span class="resumo-total-label">Total da Compra</span>
          <!-- Elemento atualizado via DOM com o valor calculado pelo Reduce -->
          <span id="total-compra">R$ 0,00</span>
        </div>

        <!-- Botão de desconto usando Reduce -->
        <button class="btn-desconto" id="btn-desconto">
          🏷 Aplicar desconto de 10%
        </button>

        <button class="btn-finalizar">
          Finalizar Compra →
        </button>
      </aside>

    </div>
  </main>

  <footer>
    <p>© 2025 <span>Volt Motos</span> — Feito com cuidado e código limpo.</p>
  </footer>

  <script src="/src/js/script.js"></script>
</body>
</html>
